name: Backend deploy

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.phala.yml
      - phala.toml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.base.json
      - packages/backend/**
      - packages/shared/**
      - .github/workflows/backend-deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/tinycloudlabs/githaiku-backend
  PHALA_CLI_VERSION: 1.1.19
  GITHAIKU_INGRESS_IMAGE: ${{ vars.GITHAIKU_INGRESS_IMAGE || 'dstacktee/dstack-ingress:20250924@sha256:40429d78060ef3066b5f93676bf3ba7c2e9ac47d4648440febfdda558aed4b32' }}
  GITHAIKU_NODE_HOST: ${{ vars.GITHAIKU_NODE_HOST || 'https://tee.node.tinycloud.xyz' }}
  GITHAIKU_PUBLIC_URL: ${{ vars.GITHAIKU_PUBLIC_URL || 'https://api.githaiku.com' }}
  GITHAIKU_ALLOWED_ORIGINS: ${{ vars.GITHAIKU_ALLOWED_ORIGINS || 'https://githaiku.com,https://www.githaiku.com,https://git-haiku.pages.dev' }}
  REDPILL_BASE_URL: ${{ vars.REDPILL_BASE_URL || 'https://api.redpill.ai/v1' }}
  REDPILL_MODEL: ${{ vars.REDPILL_MODEL || 'phala/deepseek-v4-flash' }}
  GITHAIKU_HAIKU_RATE_MAX: ${{ vars.GITHAIKU_HAIKU_RATE_MAX || '20' }}
  GITHAIKU_HAIKU_RATE_WINDOW: ${{ vars.GITHAIKU_HAIKU_RATE_WINDOW || '1 minute' }}
  PHALA_INGRESS_DOMAIN: ${{ vars.PHALA_INGRESS_DOMAIN || 'api.githaiku.com' }}

jobs:
  deploy:
    name: Build, push, and deploy backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Existing org packages may not grant write_package to GITHUB_TOKEN.
          # Set GHCR_PAT/GHCR_USERNAME when the fallback token is denied.
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # GIT_SHA is baked into the image and surfaced on GET /info as the
          # deploy provenance signal internal.tinycloud.xyz compares against the
          # repo default-branch HEAD. On a push to main this is the deployed HEAD.
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:main-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write Phala deploy env
        env:
          PHALA_API_TOKEN: ${{ secrets.PHALA_API_TOKEN }}
          REDPILL_API_KEY: ${{ secrets.REDPILL_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL || secrets.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail
          test -n "$PHALA_API_TOKEN" || (echo "Missing required secret PHALA_API_TOKEN" >&2; exit 1)
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing required secret CLOUDFLARE_API_TOKEN" >&2; exit 1)
          test -n "$CERTBOT_EMAIL" || (echo "Missing required CERTBOT_EMAIL variable or secret" >&2; exit 1)

          cat > .env.ci-prod <<EOF
          GITHAIKU_BACKEND_IMAGE=${IMAGE_NAME}@${{ steps.build.outputs.digest }}
          GITHAIKU_INGRESS_IMAGE=${GITHAIKU_INGRESS_IMAGE}
          GITHAIKU_NODE_HOST=${GITHAIKU_NODE_HOST}
          GITHAIKU_PUBLIC_URL=${GITHAIKU_PUBLIC_URL}
          GITHAIKU_ALLOWED_ORIGINS=${GITHAIKU_ALLOWED_ORIGINS}
          REDPILL_API_KEY=${REDPILL_API_KEY}
          REDPILL_BASE_URL=${REDPILL_BASE_URL}
          REDPILL_MODEL=${REDPILL_MODEL}
          GITHAIKU_HAIKU_RATE_MAX=${GITHAIKU_HAIKU_RATE_MAX}
          GITHAIKU_HAIKU_RATE_WINDOW=${GITHAIKU_HAIKU_RATE_WINDOW}
          PHALA_INGRESS_DOMAIN=${PHALA_INGRESS_DOMAIN}
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          CERTBOT_EMAIL=${CERTBOT_EMAIL}
          EOF

      - name: Install Phala CLI
        run: npm install --global phala@${PHALA_CLI_VERSION}

      - name: Deploy backend to Phala
        env:
          PHALA_API_TOKEN: ${{ secrets.PHALA_API_TOKEN }}
        run: phala deploy --api-token "$PHALA_API_TOKEN" -c docker-compose.phala.yml -e .env.ci-prod --wait

      - name: Smoke test deployed report routes
        run: |
          set -euo pipefail
          request_status() {
            local output_file="$1"
            shift

            local status
            if status=$(curl --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 2 --retry-all-errors -sS -o "$output_file" -w '%{http_code}' "$@"); then
              printf '%s' "$status"
            else
              printf '000'
            fi
          }

          for i in $(seq 1 30); do
            owner_status=$(request_status /tmp/owner-report.json -X POST "${GITHAIKU_PUBLIC_URL}/api/reports/last-week" -H 'content-type: application/json' --data '{}')
            share_status=$(request_status /tmp/share-report.json -X POST "${GITHAIKU_PUBLIC_URL}/api/reports/last-week/share" -H 'content-type: application/json' --data '{"code":"bad-code"}')

            if [ "$owner_status" = "401" ] && [ "$share_status" = "200" ]; then
              exit 0
            fi

            echo "Report routes not ready yet (owner=$owner_status share=$share_status), retry $i/30"
            sleep 10
          done

          echo "Report routes did not return expected statuses after deploy (owner=401 share=200)" >&2
          echo "owner route body:" >&2
          cat /tmp/owner-report.json >&2 || true
          echo "share route body:" >&2
          cat /tmp/share-report.json >&2 || true
          exit 1
