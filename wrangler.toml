name = "git-haiku"
pages_build_output_dir = "packages/frontend/dist"
compatibility_date = "2026-05-12"

# Static Vite frontend on Cloudflare Pages (no Pages Functions).
#
# These [vars] are RUNTIME bindings and are NOT injected into `vite build`.
# Build-time VITE_* values are baked at build by Vite from the build
# environment. For CF Pages Git builds they MUST be set as Production build
# environment variables in the dashboard (Settings -> Environment variables):
#
#   VITE_BACKEND_URL   = https://api.githaiku.com   (the attested backend origin)
#   VITE_OPENKEY_HOST  = https://openkey.so         (optional; this is the default)
#
# Kept here for parity / discoverability and in case Pages Functions are added.
[vars]
VITE_BACKEND_URL = "https://api.githaiku.com"
VITE_OPENKEY_HOST = "https://openkey.so"
