services:
  githaiku-backend:
    image: ${GITHAIKU_BACKEND_IMAGE:-ghcr.io/tinycloudlabs/githaiku-backend:latest}
    platform: linux/amd64
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: "8787"
      HOST: "0.0.0.0"
      # In-TEE: derive the backend key + produce real attestation via the dstack
      # socket. GITHAIKU_BACKEND_PRIVATE_KEY is intentionally NOT set here — the
      # key is derived inside the enclave and never leaves it.
      GITHAIKU_TEE: "1"
      GITHAIKU_SECRETS_PROVIDER: "sdk"
      # Persist owner records + the delegation store on a named volume so they
      # survive redeploys (the container rootfs is ephemeral).
      GITHAIKU_DATA_DIR: /data
      GITHAIKU_NODE_HOST: ${GITHAIKU_NODE_HOST:-https://tee.node.tinycloud.xyz}
      GITHAIKU_PUBLIC_URL: ${GITHAIKU_PUBLIC_URL:-https://api.githaiku.com}
      GITHAIKU_ALLOWED_ORIGINS: ${GITHAIKU_ALLOWED_ORIGINS:-https://githaiku.com,https://www.githaiku.com}
      # RedPill confidential LLM key — dstack ENCRYPTED env (via `phala deploy -e`),
      # never baked into the image. Empty default => deterministic fallback.
      REDPILL_API_KEY: ${REDPILL_API_KEY:-}
      REDPILL_BASE_URL: ${REDPILL_BASE_URL:-https://api.redpill.ai/v1}
      REDPILL_MODEL: ${REDPILL_MODEL:-phala/deepseek-v4-flash}
      # Rate-limit knobs for /api/haiku (brute-force protection).
      GITHAIKU_HAIKU_RATE_MAX: ${GITHAIKU_HAIKU_RATE_MAX:-20}
      GITHAIKU_HAIKU_RATE_WINDOW: ${GITHAIKU_HAIKU_RATE_WINDOW:-1 minute}
    volumes:
      # Required for dstack key derivation + TDX attestation.
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      # Owner/delegation app state — survives redeploys (mirrors cert-data).
      - githaiku-data:/data
    restart: unless-stopped

  dstack-ingress:
    # Canonical Phala dstack-ingress (auto TLS via Let's Encrypt + Cloudflare DNS),
    # pinned by digest so the attested compose-hash is reproducible.
    image: ${GITHAIKU_INGRESS_IMAGE:-dstacktee/dstack-ingress:20250924@sha256:40429d78060ef3066b5f93676bf3ba7c2e9ac47d4648440febfdda558aed4b32}
    ports:
      - "443:443"
    depends_on:
      - githaiku-backend
    environment:
      DOMAIN: ${PHALA_INGRESS_DOMAIN:-api.githaiku.com}
      TARGET_ENDPOINT: http://githaiku-backend:8787
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      # dstack injects DSTACK_GATEWAY_DOMAIN at runtime; the ingress points the
      # custom domain's CNAME at the CVM's gateway automatically (no manual paste).
      GATEWAY_DOMAIN: _.${DSTACK_GATEWAY_DOMAIN}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      SET_CAA: "true"
      DNS_PROVIDER: cloudflare
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data:/etc/letsencrypt
    restart: unless-stopped

volumes:
  cert-data:
  githaiku-data:
